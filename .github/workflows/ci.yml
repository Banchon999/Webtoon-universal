name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies (no GUI / no torch needed for unit tests)
        run: |
          pip install "transformers>=5.0,<6" "Pillow>=10.4" opencv-python-headless "numpy<3" \
                      httpx platformdirs pythainlp huggingface_hub \
                      pytest respx ruff
          pip install -e . --no-deps

      - name: Lint
        run: ruff check src tests scripts

      - name: Unit tests
        run: pytest -q
